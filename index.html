    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;

    }

    .bottomLeft {
      position: absolute;

      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;

<style>

  #loading{

   position:fixed;
   top:0;
   left:0;
   width:100%;
   height:100vh;

   background:white;

   display:flex;
   align-items:center;
   justify-content:center;

   z-index:9999;

  }


  .spinner{

   width:50px;
   height:50px;

   border:5px solid #eee;

   border-top:5px solid orange;

   border-radius:50%;

   animation:spin 1s linear infinite;

  }


  @keyframes spin{

   from{
   transform:rotate(0deg);
   }

   to{
   transform:rotate(360deg);
   }

  }
  .loader-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}

.loading-text{
  font-size:14px;
  color:#666;

<script src="flutter_bootstrap.js" async></script>


<script>
  // 1. Standard event listener for modern engines
  window.addEventListener("flutter-first-frame", function () {
    var loader = document.getElementById("loading");
    if (loader) loader.style.display = "none";
  });

  // 2. Fallback safety timeout for older iOS WebKit engines (iPhone 11, etc.)
  setTimeout(function() {
    var loader = document.getElementById("loading");
    if (loader && loader.style.display !== "none") {
      console.warn("Forcing loader removal via WebKit timeout safety hook.");
      loader.style.display = "none";
    }
  }, 4000); // 4 seconds threshold frame window
</script>
